# Vishvakarma.OS — Supabase Auth + Postgres (production backend)

project_id = "jyocvwipthswfcmvqgqe"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://vishvakarma-os.app"
additional_redirect_urls = [
  "https://vishvakarma-os.app/auth",
  "https://vishvakarma-os.app/editor",
  "https://vishvakarma-os.app/**",
  "https://vishvakarma-os.vercel.app/auth",
  "https://vishvakarma-os.vercel.app/**",
  "https://*.vercel.app/auth",
  "http://127.0.0.1:5173/auth",
  "http://127.0.0.1:5173/**",
]
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

# Vishvakarma.OS is Google SSO-only. Password, magic-link, phone, and anonymous
# entry points stay disabled locally to match application and API enforcement.
[auth.email]
enable_signup = false
enable_confirmations = true
double_confirm_changes = true
secure_password_change = true

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# Phone MFA is intentionally disabled: it requires an SMS provider and incurs a
# paid Advanced MFA Phone add-on. TOTP is the supported additional factor.
[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
redirect_uri = ""
skip_nonce_check = false
