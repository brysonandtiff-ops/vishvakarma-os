    <!-- T3-4: Fonts are self-hosted via @fontsource packages (see src/main.tsx).
         The Google Fonts links have been removed to eliminate the render-blocking
         external stylesheet request and enable offline PWA font support. -->
    <!-- Startup splash: painted from inline CSS before the module script (and its
         render-blocking CSS/font imports) executes, so there is no blank dark flash
         on cold, installed-PWA, or iOS launches. Removed by src/main.tsx once React
         has painted. Uses a system font stack because the brand fonts are not yet
         loaded at this point, and honours prefers-reduced-motion. -->
    <link rel="preload" as="image" href="/icons/icon.svg" />
    <style id="boot-splash-style">
      #boot-splash {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 2147483646;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background:
          radial-gradient(120% 80% at 50% 32%, rgba(212, 160, 71, 0.1), transparent 60%),
          #17120c;
        color: #f4ead6;
        opacity: 1;
        transition: opacity 420ms ease;
        -webkit-font-smoothing: antialiased;
      }
      #boot-splash.boot-splash--hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .boot-splash__logo {
        width: 112px;
        height: 112px;
        border-radius: 28px;
        filter: drop-shadow(0 6px 26px rgba(212, 160, 71, 0.38));
        animation: boot-splash-breathe 3.2s ease-in-out infinite;
      }
      #boot-splash .boot-splash__wordmark {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        color: #f4ead6;
      }
      #boot-splash .boot-splash__track {
        position: relative;
        width: 168px;
        height: 3px;
        border-radius: 999px;
        background: rgba(212, 160, 71, 0.16);
        overflow: hidden;
      }
      #boot-splash .boot-splash__bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, hsl(43 65% 52%), transparent);
        animation: boot-splash-slide 1.15s ease-in-out infinite;
      }
      @keyframes boot-splash-slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
      @keyframes boot-splash-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .boot-splash__logo { animation: none; }
        #boot-splash .boot-splash__bar {
          animation: none;
          width: 100%;
          background: rgba(212, 160, 71, 0.55);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" role="status" aria-label="Loading Vishvakarma.OS">
      <img
        class="boot-splash__logo"
        src="/icons/icon.svg"
        alt=""
        aria-hidden="true"
        draggable="false"
      />
      <p class="boot-splash__wordmark">VISHVAKARMA.OS</p>
      <div class="boot-splash__track" aria-hidden="true">
        <div class="boot-splash__bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
