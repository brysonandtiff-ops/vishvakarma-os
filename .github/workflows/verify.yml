name: Verify Vishvakarma.OS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, security, evidence, test, route smoke, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Check Vercel security headers
        run: node scripts/quality/check-vercel-security.mjs

      - name: Check launch evidence templates
        run: pnpm run launch:evidence

      - name: Unit tests
        run: pnpm run test:coverage

      - name: Production route gate
        run: pnpm run test:routes

      - name: Build
        run: pnpm run build

      - name: Generate world record measurement
        run: pnpm run record:measure

      - name: Upload world record evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: world-record-evidence
          path: |
            docs/world-record/latest-measurement.json
            public/world-record/latest-measurement.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vishvakarma-os-dist
          path: dist
          if-no-files-found: warn
          retention-days: 14

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder-firebase-api-key
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_APP_ID: 1:1234567890:web:ci-placeholder
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key-that-is-long-enough-for-runtime-guard
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14
