name: Verify Vishvakarma.OS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, route smoke, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production verification gate
        run: pnpm run verify:ci

      - name: Upload production build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vishvakarma-os-dist
          path: dist
          if-no-files-found: error
          retention-days: 14
