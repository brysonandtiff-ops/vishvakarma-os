name: Verify Vishvakarma.OS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, security, evidence, test, route smoke, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Check Vercel security headers
        run: node scripts/quality/check-vercel-security.mjs

      - name: Auth configuration guard
        run: pnpm run auth:gates

      - name: Firebase auth config smoke
        run: pnpm run test:supabase-auth

      - name: Supabase login data wiring
        run: pnpm run verify:supabase-login-data

      - name: Supabase schema wiring
        run: pnpm run verify:supabase-schema

      - name: Check launch evidence templates
        run: pnpm run launch:evidence

      - name: System contract gates
        run: pnpm run contract:gates

      - name: Regression anchors
        run: pnpm run test:anchors

      - name: Unit tests
        run: pnpm run test:coverage

      - name: Production route gate
        run: pnpm run test:routes

      - name: Build
        run: pnpm run build

      - name: Generate world record measurement
        run: pnpm run record:measure

      - name: Upload world record evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: world-record-evidence
          path: |
            docs/world-record/latest-measurement.json
            public/world-record/latest-measurement.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload production build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: vishvakarma-os-dist
          path: dist
          if-no-files-found: warn
          retention-days: 14

  e2e-production-auth:
    name: Production OAuth (all browsers)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Verify production Google OAuth flow
        run: pnpm run verify:production-auth-flow

  e2e:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BROWSERS: ${{ matrix.browser }}
          PLAYWRIGHT_HTML_REPORT: playwright-report-${{ matrix.browser }}
          VITE_FIREBASE_API_KEY: ci-placeholder-firebase-api-key
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_APP_ID: 1:1234567890:web:ci-placeholder
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report-${{ matrix.browser }}
          if-no-files-found: ignore
          retention-days: 14

  release-gates:
    name: Release gate manifest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [e2e, e2e-production-auth]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run release gates
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder-firebase-api-key
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_APP_ID: 1:1234567890:web:ci-placeholder
        run: pnpm run release:gates
