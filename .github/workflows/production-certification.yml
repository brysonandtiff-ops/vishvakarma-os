name: Production Certification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-certification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auth-platform-hardening:
    name: Supabase Auth platform hardening
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_PROJECT_REF: jyocvwipthswfcmvqgqe
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout pull request head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout main or manual-dispatch SHA
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4

      - name: Verify exact checkout
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            expected="${{ github.event.pull_request.head.sha }}"
          else
            expected="${{ github.sha }}"
          fi
          test "$(git rev-parse HEAD)" = "$expected"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require Supabase management credential
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::Repository secret SUPABASE_ACCESS_TOKEN is not configured."
            exit 1
          fi

      - name: Enable HIBP and verify TOTP policy
        run: pnpm run setup:supabase-auth:hardening

  browser-certification:
    name: Cross-browser and strict release certification
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PLAYWRIGHT_BROWSERS: all
      PRODUCTION_AUTH_URL: https://vishvakarma-os.app/auth
    steps:
      - name: Checkout pull request head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout main or manual-dispatch SHA
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4

      - name: Verify exact checkout
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            expected="${{ github.event.pull_request.head.sha }}"
          else
            expected="${{ github.sha }}"
          fi
          test "$(git rev-parse HEAD)" = "$expected"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser runtimes
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Chromium, Firefox, and WebKit E2E
        run: pnpm run test:e2e

      - name: Accessibility browser audit
        run: pnpm run test:e2e:a11y

      - name: Editor performance browser audit
        run: pnpm run test:e2e:perf

      - name: Production auth route verification
        run: pnpm run verify:production-auth-flow

      - name: Strict release gates
        run: pnpm run release:gates:strict

      - name: Strict launch evidence gates
        run: pnpm run launch:evidence:strict

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-certification-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            playwright-report/
            test-results/
            docs/release/evidence/
