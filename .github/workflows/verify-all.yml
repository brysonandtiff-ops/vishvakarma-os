name: Verify All

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-all-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-all:
    name: Verify All Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test --if-present

      - name: Production build
        run: npm run build --if-present

      - name: Verify all
        run: npm run verify:all --if-present
