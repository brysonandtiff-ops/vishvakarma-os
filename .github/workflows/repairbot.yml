name: RepairBot hygiene

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  repairbot-dry-run:
    name: RepairBot dry-run (report only)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: RepairBot fast dry-run
        run: pnpm run repairbot:dry

      - name: Upload RepairBot report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: repairbot-last-run
          path: .repairbot/last-run.json
          if-no-files-found: warn
          retention-days: 7
