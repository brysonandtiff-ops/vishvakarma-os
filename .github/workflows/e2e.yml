name: E2E Auth Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auth-gate:
    name: Browser auth/private-route proof
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build production app
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder-firebase-api-key
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_APP_ID: 1:1234567890:web:ci-placeholder
        run: pnpm run build

      - name: Run auth/private-route E2E proof
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder-firebase-api-key
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_APP_ID: 1:1234567890:web:ci-placeholder
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-auth-gate-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14
