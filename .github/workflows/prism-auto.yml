name: PRISM Auto
on:
  pull_request:
  push:
    branches: [ main, master ]
jobs:
  prism-auto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run PRISM Auto
        run: python tools/prism_auto.py --ci --skip-heavy
